<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Project Template</title>
		<meta name="project-id" content="replace-with-project-id" />
		<meta name="project-title" content="Project Title" />
		<meta name="project-highlight" content="false" />
		<link rel="stylesheet" href="../../css/project-subpages.css" />
	</head>
	<body>
		<main class="project-page">
			<div class="project-page__left">
				<header class="project-page__header">
					<h1>Project Title</h1>
					<p>
						Short summary of the project.
					</p>
				</header>

				<section class="project-page__meta">
					<div class="tags" aria-label="Project tags">
						<span class="tag">Tag 1</span>
						<span class="tag">Tag 2</span>
					</div>
				</section>

				<section class="project-page__content">
					<h2>Context</h2>
					<p>
						Describe the motivation and context of the project.
					</p>

					<h2>Approach</h2>
					<p>
						Explain what you built, tested, or explored.
					</p>

					<h2>Outcome</h2>
					<p>
						Summarize results, impact, and future directions.
					</p>
				</section>
			</div>

			<div class="project-page__right">
				<section class="project-page__hero">
					<img src="../../assets/img/placeholder.png" alt="Project cover image" />
				</section>

				<section class="project-page__links">
					<h2>Links</h2>
					<ul>
						<li><a href="#">Paper</a></li>
						<li><a href="#">Code</a></li>
						<li><a href="#">Slides</a></li>
					</ul>
				</section>
			</div>
		</main>

		<!--
			IMPORTANT:
			- Keep project-highlight metadata in sync with subpages/projects/projects.json.
			- The homepage "Latest Projects" window reads highlight from projects.json.
		-->
	</body>
</html>
